      .dato-valor{font-size:17px}.cart-fab{bottom:16px;left:16px}.wa-float{bottom:16px;right:16px}
    }
  </style>
</head>

<div class="toast" id="toast"></div>

<script>
  const SUPA_URL = 'https://aetktfzewcrmetqyxbew.supabase.co';
  const SUPA_KEY = 'sb_publishable_QEHgCTmk9El1nJpMP-07Ig_Qbv4Wox5';

  var carrito = [];
  var ultimaBusqueda = '';
  var datosComodinGlobal = null;

  function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function fmt(v){ return '$'+Number(v).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function stockInfo(q){ if(q<=0) return {cls:'stock-cero',dot:'cero',label:'Sin stock'}; if(q<=5) return {cls:'stock-bajo',dot:'bajo',label:q+' uds'}; return {cls:'stock-ok',dot:'ok',label:q+' uds'}; }
  function showToast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
  function setQ(v){ document.getElementById('codigo').value=v; buscar(); }

  document.getElementById('codigo').addEventListener('keydown',e=>{ if(e.key==='Enter') buscar(); });
  window.addEventListener('scroll',()=>{ document.getElementById('waFloat').style.display=window.scrollY>300?'flex':'none'; });

  async function supaFetch(url){
    const r = await fetch(url,{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
    return r.json();
  }

  async function buscar(){
    const raw = document.getElementById('codigo').value.trim();
    if(!raw) return;
    const q = raw.toUpperCase();
    ultimaBusqueda = q;
    const esComodin = q.includes('*');

    const btn = document.getElementById('btnBuscar');
    btn.disabled = true;
    document.getElementById('spinner').style.display = 'block';
    document.getElementById('resultados').style.display = 'none';
    document.getElementById('error').style.display = 'none';

    try {
      let rows = [];

      if(esComodin){
        // Búsqueda con comodín usando ilike
        const patron = q.replace(/\*/g,'%');
        const url = `${SUPA_URL}/rest/v1/inventario?codigo=ilike.${encodeURIComponent(patron)}&select=codigo,descripcion,precio,stock_total,codigo_alternativo&order=codigo&limit=300`;
        rows = await supaFetch(url);
      } else {
        // Búsqueda exacta + BFS de alternativos
        rows = await buscarConAlternativos(q);
      }

      btn.disabled = false;
      document.getElementById('spinner').style.display = 'none';

      if(!rows || rows.length===0){
        document.getElementById('errorText').textContent = `No se encontró "${q}" en el inventario.`;
        document.getElementById('error').style.display = 'block';
        return;
      }

      let html = '';
      if(esComodin){
        datosComodinGlobal = rows;
        html = crearSelector(rows);
      } else {
        datosComodinGlobal = null;
        const principal = rows.find(r=>r.esPrincipal);
        const otros = rows.filter(r=>!r.esPrincipal);
        html = `<div class="result-header"><span class="result-count">Se encontraron <strong>${rows.length}</strong> resultado${rows.length>1?'s':''}</span></div>`;
        html += crearCard(principal, false);
        if(otros.length>0){
          html += `<div class="titulo-alternativos">Códigos alternativos (${otros.length})</div>`;
          otros.forEach(r => html += crearCard(r, true));
        }
      }

      const cont = document.getElementById('resultados');
      cont.innerHTML = html;
      cont.style.display = 'block';
      cont.scrollIntoView({behavior:'smooth',block:'start'});

    } catch(e){
      btn.disabled = false;
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('errorText').textContent = 'Error de conexión. Inténtalo de nuevo.';
      document.getElementById('error').style.display = 'block';
    }
  }

  async function buscarConAlternativos(codigo){
    // BFS: busca familia completa de alternativos
    const visitados = new Set();
    const cola = [codigo];
    const resultados = [];

    while(cola.length > 0){
      const actual = cola.shift();
      if(visitados.has(actual)) continue;
      visitados.add(actual);

      // Buscar este código en la tabla
      const url = `${SUPA_URL}/rest/v1/inventario?codigo=ilike.${encodeURIComponent(actual)}&select=codigo,descripcion,precio,stock_total,codigo_alternativo&limit=50`;
      const filas = await supaFetch(url);

      if(filas && filas.length > 0){
        // Tomar la primera fila con datos del artículo
        const fila = filas[0];
        if(!resultados.find(r=>r.codigo.toUpperCase()===actual)){
          resultados.push({
            codigo: fila.codigo,
            descripcion: fila.descripcion,
            precio: fila.precio,
            stock: fila.stock_total,
            esPrincipal: fila.codigo.toUpperCase() === codigo
          });
        }
        // Agregar alternativos a la cola
        filas.forEach(f => {
          if(f.codigo_alternativo){
            const alt = f.codigo_alternativo.trim().toUpperCase();
            if(alt && !visitados.has(alt)) cola.push(alt);
          }
        });
      }
    }

    // Buscar también artículos que tienen a "codigo" como su alternativo (bidireccional)
    const urlRev = `${SUPA_URL}/rest/v1/inventario?codigo_alternativo=ilike.${encodeURIComponent(codigo)}&select=codigo,descripcion,precio,stock_total,codigo_alternativo&limit=50`;
    const rev = await supaFetch(urlRev);
    if(rev && rev.length > 0){
      rev.forEach(f => {
        const c = f.codigo.toUpperCase();
        if(!visitados.has(c)){
          visitados.add(c);
          resultados.push({
            codigo: f.codigo,
            descripcion: f.descripcion,
            precio: f.precio,
            stock: f.stock_total,
            esPrincipal: false
          });
          if(f.codigo_alternativo){
            const alt = f.codigo_alternativo.trim().toUpperCase();
            if(alt && !visitados.has(alt)) cola.push(alt);
          }
        }
      });
    }

    resultados.sort((a,b)=>(b.esPrincipal?1:0)-(a.esPrincipal?1:0));
    return resultados;
  }

  function crearSelector(rows){
    let h = `<div class="selector-panel"><div class="selector-header"><h3>Selecciona un producto</h3><span class="selector-count">${rows.length}</span></div><div class="selector-list">`;
    rows.forEach(r=>{
      const si = stockInfo(r.stock_total||0);
      h += `<div class="selector-row" onclick="seleccionar('${escH(r.codigo)}')">
        <span class="sel-cod">${escH(r.codigo)}</span>
        <span class="sel-desc">${escH(r.descripcion||'')}</span>
        <span class="sel-precio">${fmt(r.precio||0)}</span>
        <span class="sel-stock ${si.cls}"><span class="stock-dot ${si.dot}"></span>${si.label}</span>
      </div>`;
    });
    h += '</div></div>';
    return h;
  }

  async function seleccionar(codigo){
    document.getElementById('codigo').value = codigo;
    await buscar();
  }

  function crearCard(item, esAlt){
    if(!item) return '';
    const si = stockInfo(item.stock||0);
    const badge = item.esPrincipal
      ? '<span class="badge badge-principal">Seleccionado</span>'
      : '<span class="badge badge-alt">Alternativo</span>';
    const itemData = JSON.stringify({codigo:item.codigo,descripcion:item.descripcion,precio:item.precio}).replace(/'/g,'&#39;');
    const yaEnCarrito = estaEnCarrito(item.codigo);
    const btnAgregar = `<button class="btn-agregar${yaEnCarrito?' agregado':''}" onclick="agregarAlCarrito(${itemData})">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
      ${yaEnCarrito?'Agregado':'Agregar al pedido'}
    </button>`;
    return `<div class="card ${item.esPrincipal?'principal':'alt-click'}">
      <div class="card-top"><div>
        <div class="card-codigo">${escH(item.codigo)} ${badge}</div>
        <div class="card-desc">${escH(item.descripcion||'')}</div>
      </div></div>
      <div class="card-datos">
        <div class="dato"><span class="dato-label">Precio</span><span class="dato-valor precio">${fmt(item.precio||0)}</span></div>
        <div class="dato"><span class="dato-label">Stock</span><span class="dato-valor ${si.cls}"><span class="stock-dot ${si.dot}"></span>${si.label}</span></div>
      </div>
      ${btnAgregar}
    </div>`;
  }

  // ===== CARRITO =====
  function estaEnCarrito(c){ return carrito.some(i=>i.codigo===c); }

  function agregarAlCarrito(item){
    const idx = carrito.findIndex(i=>i.codigo===item.codigo);
    if(idx>=0){ carrito[idx].cantidad++; showToast(item.codigo+' — cantidad actualizada'); }
    else { carrito.push({...item,cantidad:1}); showToast(item.codigo+' — agregado al pedido'); }
    actualizarCarritoUI();
  }

  function cambiarCantidad(idx,delta){
    carrito[idx].cantidad += delta;
    if(carrito[idx].cantidad<=0) carrito.splice(idx,1);
    actualizarCarritoUI();
  }

  function obtenerTotal(){ return carrito.reduce((s,i)=>s+i.precio*i.cantidad,0); }
  function obtenerTotalArt(){ return carrito.reduce((s,i)=>s+i.cantidad,0); }

  function generarMsgWA(){
    let msg = 'Hola, necesito pasar el siguiente pedido:\n\n';
    carrito.forEach(c=>{ msg+=`• ${c.codigo} - ${c.descripcion} - ${fmt(c.precio)} x${c.cantidad} = ${fmt(c.precio*c.cantidad)}\n`; });
    msg+=`\nTotal estimado: ${fmt(obtenerTotal())}\n\nGracias.`;
    return msg;
  }

  function actualizarCarritoUI(){
    const fab=document.getElementById('cartFab'), badge=document.getElementById('cartBadge');
    const total=obtenerTotalArt();
    fab.style.display=total>0?'flex':'none';
    badge.style.display=total>0?'flex':'none';
    badge.textContent=total;
    const banner=document.getElementById('waBanner');
    if(total>0){
      banner.href='https://wa.me/528123986039?text='+encodeURIComponent(generarMsgWA());
      document.getElementById('waBannerTitle').textContent=`Enviar pedido (${total} artículo${total>1?'s':''})`;
      document.getElementById('waBannerSub').textContent='Total: '+fmt(obtenerTotal());
    } else {
      banner.href='https://wa.me/528123986039?text=Hola%2C%20necesito%20pasar%20un%20pedido';
      document.getElementById('waBannerTitle').textContent='¿Necesitas pasar pedido?';
      document.getElementById('waBannerSub').textContent='Escríbenos por WhatsApp y lo preparamos';
    }
    // Actualizar botones en cards
    document.querySelectorAll('.btn-agregar').forEach(btn=>{
      try{
        const d=JSON.parse(btn.getAttribute('onclick').match(/\((.+)\)/)[1]);
        const ya=estaEnCarrito(d.codigo);
        btn.className='btn-agregar'+(ya?' agregado':'');
        btn.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>${ya?'Agregado':'Agregar al pedido'}`;
      }catch(e){}
    });
    renderCarrito();
  }

  function renderCarrito(){
    const body=document.getElementById('cartBody'), footer=document.getElementById('cartFooter');
    if(carrito.length===0){ body.innerHTML='<div class="cart-empty"><p>Tu pedido está vacío</p></div>'; footer.style.display='none'; return; }
    footer.style.display='block';
    document.getElementById('cartTotalVal').textContent=fmt(obtenerTotal());
    document.getElementById('cartWaBtn').href='https://wa.me/528123986039?text='+encodeURIComponent(generarMsgWA());
    let h='';
    carrito.forEach((c,i)=>{
      h+=`<div class="cart-item">
        <div class="cart-item-info"><div class="cart-item-cod">${escH(c.codigo)}</div><div class="cart-item-desc">${escH(c.descripcion||'')}</div><div class="cart-item-precio">${fmt(c.precio*c.cantidad)}</div></div>
        <div class="cart-item-qty">
          <button class="cart-qty-btn" onclick="cambiarCantidad(${i},-1)">−</button>
          <span class="cart-qty-num">${c.cantidad}</span>
          <button class="cart-qty-btn" onclick="cambiarCantidad(${i},1)">+</button>
        </div>
      </div>`;
    });
    body.innerHTML=h;
  }

  function abrirCarrito(){ renderCarrito(); document.getElementById('cartOverlay').classList.add('open'); document.getElementById('cartPanel').classList.add('open'); }
  function cerrarCarrito(){ document.getElementById('cartOverlay').classList.remove('open'); document.getElementById('cartPanel').classList.remove('open'); }
</script>
</body>
