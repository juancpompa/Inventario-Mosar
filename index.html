<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#020617">
  <title>MOSAR Refaccionarias</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--rojo:#B91C1C;--rojo-dark:#7F1D1D;--rojo-glow:rgba(185,28,28,.15);--verde:#059669;--verde-bg:#ECFDF5;--slate-950:#020617;--slate-900:#0F172A;--slate-700:#334155;--slate-600:#475569;--slate-500:#64748B;--slate-400:#94A3B8;--slate-300:#CBD5E1;--slate-200:#E2E8F0;--slate-100:#F1F5F9;--slate-50:#F8FAFC;--wa:#25D366;--r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:'DM Sans',sans-serif;background:var(--slate-100);min-height:100vh;display:flex;flex-direction:column;align-items:center;color:var(--slate-900);-webkit-font-smoothing:antialiased;padding-bottom:100px}
    .header{width:100%;background:linear-gradient(135deg,var(--slate-950) 0%,var(--slate-900) 60%,#1a0505 100%);position:relative;overflow:hidden}
    .header::before{content:'';position:absolute;top:-40%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(185,28,28,.12) 0%,transparent 65%);border-radius:50%}
    .header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(185,28,28,.5),transparent)}
    .header-inner{max-width:720px;margin:0 auto;padding:1.5rem 1.25rem;display:flex;align-items:center;gap:1.25rem;position:relative;z-index:1}
    .logo-wrap{flex-shrink:0;width:130px;cursor:pointer;transition:opacity .2s}
    .logo-wrap:hover{opacity:.85}
    .logo-wrap:active{opacity:.7;transform:scale(.97)}
    .logo-wrap img{width:100%;display:block;filter:drop-shadow(0 2px 12px rgba(0,0,0,.5))}
    .header-title{font-size:24px;color:#fff;font-family:'Outfit',sans-serif;font-weight:900;letter-spacing:-.5px;line-height:1.1}
    .header-title span{color:var(--rojo)}
    .header-sub{font-size:14px;color:var(--slate-400);margin-top:8px;display:flex;align-items:center;gap:6px;font-weight:500}
    .dot-live{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;flex-shrink:0;animation:livepulse 2s infinite}
    @keyframes livepulse{0%,100%{opacity:1}50%{opacity:.3}}
    .container{width:100%;max-width:720px;padding:1.25rem 1rem 2rem}
    .search-box{background:#fff;border-radius:var(--r-xl);padding:1.1rem;box-shadow:0 4px 24px rgba(0,0,0,.07);border:1px solid var(--slate-200);margin-top:-.75rem;margin-bottom:1rem}
    .search-tabs{display:flex;gap:4px;margin-bottom:10px;background:var(--slate-100);border-radius:var(--r-md);padding:3px}
    .stab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;color:var(--slate-500);border-radius:var(--r-sm);cursor:pointer;transition:all .15s;border:none;background:none;font-family:'DM Sans',sans-serif;touch-action:manipulation}
    .stab.active{background:#fff;color:var(--slate-900);box-shadow:0 1px 4px rgba(0,0,0,.08)}
    .search-row{display:flex;gap:8px}
    .input-wrap{flex:1;position:relative}
    .input-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--slate-400);pointer-events:none}
    input[type=text]{width:100%;padding:13px 12px 13px 42px;border:2px solid var(--slate-200);border-radius:var(--r-md);font-size:16px;font-family:'DM Sans',sans-serif;font-weight:500;outline:none;transition:border-color .2s,box-shadow .2s;background:var(--slate-50);color:var(--slate-900)}
    input[type=text]::placeholder{color:var(--slate-400);font-weight:400}
    input[type=text]:focus{border-color:var(--rojo);box-shadow:0 0 0 3px var(--rojo-glow);background:#fff}
    #codigoInput{text-transform:uppercase}
    .btn-buscar{padding:13px 22px;background:var(--rojo);color:#fff;border:none;border-radius:var(--r-md);font-size:16px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px;touch-action:manipulation;min-width:56px;justify-content:center}
    .btn-buscar:hover:not(:disabled){background:var(--rojo-dark)}
    .btn-buscar:active:not(:disabled){transform:scale(.96)}
    .btn-buscar:disabled{background:var(--slate-300);cursor:not-allowed}
    .btn-buscar svg{width:18px;height:18px;stroke:currentColor;stroke-width:2.5;fill:none;flex-shrink:0}
    .search-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
    .chip{display:inline-flex;align-items:center;gap:3px;font-size:12px;color:var(--slate-400);background:var(--slate-50);border:1px solid var(--slate-200);padding:4px 10px;border-radius:100px;cursor:pointer;transition:all .15s;touch-action:manipulation}
    .chip:active{background:var(--slate-200)}
    .chip code{font-family:'Outfit',monospace;font-size:11px;font-weight:700;color:var(--slate-600);background:var(--slate-200);padding:1px 4px;border-radius:3px}
    .spinner{display:none;text-align:center;padding:2.5rem}
    .dots{display:inline-flex;gap:5px;margin-bottom:10px}
    .dots span{width:8px;height:8px;border-radius:50%;background:var(--rojo);animation:dp 1.2s ease-in-out infinite}
    .dots span:nth-child(2){animation-delay:.15s}.dots span:nth-child(3){animation-delay:.3s}
    @keyframes dp{0%,80%,100%{opacity:.2;transform:scale(.75)}40%{opacity:1;transform:scale(1)}}
    .spinner-txt{font-size:14px;color:var(--slate-500)}
    .err-box{display:none;background:#fff;border:1px solid #FECACA;border-left:4px solid var(--rojo);border-radius:var(--r-md);padding:14px 16px;font-size:14px;color:var(--rojo-dark)}
    .err-title{font-weight:700;margin-bottom:3px}
    .resultados{display:none}
    .sel-panel{background:#fff;border-radius:var(--r-lg);border:1px solid var(--slate-200);box-shadow:0 4px 24px rgba(0,0,0,.07);overflow:hidden;animation:fadeUp .25s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .sel-head{padding:12px 16px;background:var(--slate-50);border-bottom:1px solid var(--slate-200);display:flex;align-items:center;justify-content:space-between}
    .sel-head h3{font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:var(--slate-700)}
    .sel-count{background:var(--rojo);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px}
    .sel-list{max-height:460px;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
    .sel-row{display:grid;grid-template-columns:minmax(90px,130px) 1fr auto;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--slate-100);cursor:pointer;transition:background .1s;touch-action:manipulation}
    .sel-row:last-child{border-bottom:none}
    .sel-row:active{background:var(--slate-50)}
    .sel-cod{font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:var(--slate-900)}
    .sel-row:hover .sel-cod,.sel-row:active .sel-cod{color:var(--rojo)}
    .sel-desc{font-size:12px;color:var(--slate-500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
    .sel-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .sel-precio{font-family:'Outfit',sans-serif;font-size:12.5px;font-weight:700;color:var(--verde);white-space:nowrap}
    .sel-stock{font-size:11px;font-weight:600;display:flex;align-items:center;gap:3px;white-space:nowrap}
    .sel-stock.ok{color:var(--verde)}.sel-stock.bajo{color:var(--rojo)}.sel-stock.cero{color:var(--slate-400)}
    .sel-qty{display:flex;align-items:center;border:1.5px solid var(--slate-200);border-radius:var(--r-sm);overflow:hidden;flex-shrink:0}
    .sel-qty-btn{width:30px;height:30px;border:none;background:var(--slate-50);cursor:pointer;font-size:16px;font-weight:700;color:var(--slate-600);line-height:1;touch-action:manipulation}
    .sel-qty-btn:active{background:var(--slate-200)}
    .sel-qty-num{min-width:26px;text-align:center;font-size:13px;font-weight:700;border-left:1px solid var(--slate-200);border-right:1px solid var(--slate-200);line-height:30px;font-family:'Outfit',sans-serif}
    .sel-qty-num.cero{color:var(--slate-300)}.sel-qty-num.activo{color:var(--rojo)}
    .res-header{display:flex;align-items:center;margin-bottom:10px}
    .res-count{font-size:12px;font-weight:600;color:var(--slate-400);text-transform:uppercase;letter-spacing:.06em}
    .res-count strong{color:var(--slate-800)}
    .card{background:#fff;border-radius:var(--r-lg);border:1px solid var(--slate-200);padding:1rem 1.1rem;margin-bottom:9px;box-shadow:0 1px 4px rgba(0,0,0,.04);animation:fadeUp .3s ease both;position:relative}
    .card:nth-child(2){animation-delay:.05s}.card:nth-child(3){animation-delay:.1s}.card:nth-child(4){animation-delay:.15s}
    .card.principal{border-color:rgba(185,28,28,.25);background:linear-gradient(135deg,#fff,#FFFCFC)}
    .card.alt-click{cursor:pointer}
    .card.alt-click:active{background:var(--slate-50)}
    .card-cod{font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;color:var(--slate-900);display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:3px}
    .card-desc{font-size:13px;color:var(--slate-500);line-height:1.4;margin-bottom:12px}
    .badge{display:inline-flex;align-items:center;font-size:9.5px;font-weight:700;padding:2px 9px;border-radius:100px;letter-spacing:.04em;text-transform:uppercase}
    .badge-p{background:var(--rojo);color:#fff}
    .badge-a{background:var(--verde-bg);color:var(--verde);border:1px solid #A7F3D0}
    .card-datos{display:flex;background:var(--slate-50);border-radius:var(--r-sm);overflow:hidden;margin-bottom:12px}
    .dato{flex:1;padding:12px 14px;display:flex;flex-direction:column;position:relative}
    .dato+.dato::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:1px;background:var(--slate-200)}
    .dato-lbl{font-size:10px;color:var(--slate-400);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
    .dato-val{font-family:'Outfit',sans-serif;font-size:22px;font-weight:700;margin-top:2px}
    .dato-val.precio{color:var(--verde)}.dato-val.ok{color:var(--verde)}.dato-val.bajo{color:var(--rojo)}.dato-val.cero{color:var(--slate-400)}
    .dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
    .dot.ok{background:var(--verde)}.dot.bajo{background:var(--rojo);animation:pulse 1.5s infinite}.dot.cero{background:var(--slate-300)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .card-add-row{display:flex;align-items:center;gap:10px}
    .card-qty{display:flex;align-items:center;border:1.5px solid var(--slate-200);border-radius:var(--r-sm);overflow:hidden}
    .card-qty-btn{width:38px;height:38px;border:none;background:var(--slate-50);cursor:pointer;font-size:18px;font-weight:700;color:var(--slate-600);line-height:1;touch-action:manipulation}
    .card-qty-btn:active{background:var(--slate-200)}
    .card-qty-btn.minus:active{background:#FEE2E2;color:var(--rojo)}
    .card-qty-num{min-width:40px;text-align:center;font-size:16px;font-weight:700;border-left:1px solid var(--slate-200);border-right:1px solid var(--slate-200);line-height:38px;font-family:'Outfit',sans-serif}
    .card-qty-num.cero{color:var(--slate-300)}.card-qty-num.activo{color:var(--rojo)}
    .add-label{font-size:13px;font-weight:600;color:var(--slate-400)}
    .add-label.activo{color:var(--verde)}
    .titulo-alt{font-size:11px;color:var(--slate-400);margin:1rem 0 8px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:8px}
    .titulo-alt::after{content:'';flex:1;height:1px;background:var(--slate-200)}
    .click-hint{position:absolute;top:12px;right:12px;font-size:10.5px;color:var(--slate-400);display:flex;align-items:center;gap:3px;opacity:0;transition:opacity .2s}
    .card.alt-click:hover .click-hint{opacity:1;color:var(--verde)}
    .click-hint svg{width:11px;height:11px;stroke:currentColor;stroke-width:2.5;fill:none}
    .wa-banner{margin-top:1.25rem;background:linear-gradient(135deg,#128C7E,#25D366);border-radius:var(--r-xl);padding:1.2rem 1.4rem;display:flex;align-items:center;gap:.9rem;text-decoration:none;color:#fff;box-shadow:0 4px 18px rgba(37,211,102,.25);cursor:pointer;touch-action:manipulation}
    .wa-banner:active{transform:scale(.98)}
    .wa-icon{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .wa-icon svg{width:24px;height:24px;fill:#fff}
    .wa-text strong{font-size:15px;font-weight:700;display:block}
    .wa-text span{font-size:12px;opacity:.9}
    .wa-arr{margin-left:auto;opacity:.7}
    .wa-arr svg{width:18px;height:18px;stroke:#fff;stroke-width:2.5;fill:none}
    .cart-fab{position:fixed;bottom:24px;left:24px;width:58px;height:58px;border-radius:50%;background:var(--slate-900);display:none;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.25);z-index:100;cursor:pointer;border:none;touch-action:manipulation}
    .cart-fab:active{transform:scale(.93)}
    .cart-fab svg{width:24px;height:24px;stroke:#fff;stroke-width:2;fill:none}
    .cart-n{position:absolute;top:-4px;right:-4px;min-width:20px;height:20px;border-radius:100px;background:var(--rojo);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;opacity:0;transition:opacity .25s}
    .overlay.open{display:block;opacity:1}
    .cart-panel{position:fixed;bottom:0;left:0;right:0;max-height:88vh;background:#fff;border-radius:var(--r-xl) var(--r-xl) 0 0;z-index:201;transform:translateY(100%);transition:transform .3s ease;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.15)}
    .cart-panel.open{transform:translateY(0)}
    .cart-handle{width:36px;height:4px;background:var(--slate-300);border-radius:2px;margin:10px auto 0;flex-shrink:0}
    .cart-hdr{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--slate-200);flex-shrink:0}
    .cart-hdr h3{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800}
    .cart-cls{width:34px;height:34px;border-radius:50%;border:none;background:var(--slate-100);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--slate-500);touch-action:manipulation}
    .cart-cls svg{width:17px;height:17px;stroke:currentColor;stroke-width:2.5;fill:none}
    .cart-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 0}
    .cart-empty{text-align:center;padding:2.5rem;color:var(--slate-400);font-size:14px}
    .cart-item{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--slate-100)}
    .ci-info{flex:1;min-width:0}
    .ci-cod{font-family:'Outfit',sans-serif;font-size:13px;font-weight:700}
    .ci-desc{font-size:12px;color:var(--slate-400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ci-precio{font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:var(--verde);margin-top:2px}
    .ci-qty{display:flex;align-items:center;border:1px solid var(--slate-200);border-radius:var(--r-sm);overflow:hidden;flex-shrink:0}
    .qbtn{width:34px;height:34px;border:none;background:var(--slate-50);cursor:pointer;font-size:16px;font-weight:700;color:var(--slate-600);touch-action:manipulation}
    .qbtn:active{background:var(--slate-200)}
    .qnum{width:34px;text-align:center;font-size:14px;font-weight:700;border-left:1px solid var(--slate-200);border-right:1px solid var(--slate-200);line-height:34px}
    .cart-ftr{padding:14px 18px;border-top:1px solid var(--slate-200);background:var(--slate-50);flex-shrink:0}
    .cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .cart-total-lbl{font-size:13px;font-weight:600;color:var(--slate-500);text-transform:uppercase;letter-spacing:.05em}
    .cart-total-val{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800}
    .btn-wa-send{width:100%;padding:15px;background:linear-gradient(135deg,#128C7E,#25D366);border:none;border-radius:var(--r-md);font-size:15px;font-weight:700;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;touch-action:manipulation}
    .btn-wa-send:active{transform:scale(.98)}
    .btn-wa-send svg{width:18px;height:18px;fill:#fff;flex-shrink:0}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:flex-end;justify-content:center}
    .modal-bg.open{display:flex}
    .modal{background:#fff;border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-width:720px;padding:1.5rem 1.25rem;box-shadow:0 -8px 40px rgba(0,0,0,.2)}
    .modal h3{font-family:'Outfit',sans-serif;font-size:19px;font-weight:800;margin-bottom:4px}
    .modal p{font-size:13px;color:var(--slate-500);margin-bottom:1.25rem}
    .modal-field{margin-bottom:12px}
    .modal-field label{display:block;font-size:11px;font-weight:700;color:var(--slate-500);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
    .modal-field input{width:100%;padding:12px 14px;border:1.5px solid var(--slate-200);border-radius:var(--r-md);font-size:16px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
    .modal-field input:focus{border-color:var(--rojo)}
    .modal-btns{display:flex;gap:8px;margin-top:1rem}
    .btn-cancelar{flex:1;padding:14px;background:#fff;border:1.5px solid var(--slate-200);border-radius:var(--r-md);font-size:15px;font-weight:600;color:var(--slate-600);cursor:pointer;font-family:'DM Sans',sans-serif;touch-action:manipulation}
    .btn-enviar{flex:2;padding:14px;background:linear-gradient(135deg,#128C7E,#25D366);border:none;border-radius:var(--r-md);font-size:15px;font-weight:700;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:7px;touch-action:manipulation}
    .btn-enviar svg{width:18px;height:18px;fill:#fff}
    .wa-float{position:fixed;bottom:24px;right:24px;width:54px;height:54px;border-radius:50%;background:var(--wa);display:none;align-items:center;justify-content:center;text-decoration:none;box-shadow:0 4px 16px rgba(37,211,102,.4);z-index:100}
    .wa-float:active{transform:scale(.93)}
    .wa-float svg{width:28px;height:28px;fill:#fff}
    .toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-70px);background:var(--slate-900);color:#fff;padding:10px 20px;border-radius:var(--r-md);font-size:14px;font-weight:600;z-index:400;transition:transform .3s;pointer-events:none;white-space:nowrap}
    .toast.show{transform:translateX(-50%) translateY(0)}
    @media(max-width:480px){
      .header-inner{padding:1.1rem 1rem;gap:1rem}
      .logo-wrap{width:105px}
      .header-title{font-size:20px}
      .header-sub{font-size:12px;margin-top:5px}
      .container{padding:1rem .875rem 2rem}
      .btn-buscar .btn-text{display:none}
      .dato-val{font-size:20px}
      .cart-fab{bottom:16px;left:16px;width:54px;height:54px}
      .wa-float{bottom:16px;right:16px;width:54px;height:54px}
      .sel-row{grid-template-columns:90px 1fr auto;padding:11px 12px}
      .sel-cod{font-size:12px}
      .sel-desc{font-size:11px}
      .modal{padding:1.25rem 1rem}
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo-wrap" onclick="irAlInicio()">
      <img src="https://z-cdn-media.chatglm.cn/files/1f0bebc7-607f-471b-9f67-9cbad505bfe4.jpg?auth_key=1876446715-de281d6e63594f8b9392382201575411-0-8bc0a77cbdb48a2db7bcadaafba44641" alt="Mosar Refaccionarias">
    </div>
    <div class="header-text">

<script>
var SUPA_URL='https://aetktfzewcrmetqyxbew.supabase.co';
var SUPA_KEY='sb_publishable_QEHgCTmk9El1nJpMP-07Ig_Qbv4Wox5';
var carrito=[],modoTab='codigo';

(function(){
  var d=new Date();
  var dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  var meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('fechaActual').textContent='Precios y stock al '+dias[d.getDay()]+' '+d.getDate()+' de '+meses[d.getMonth()]+' '+d.getFullYear();
})();

/* Regresa al inicio SIN borrar el carrito */
function irAlInicio(){
  window.scrollTo({top:0,behavior:'smooth'});
  document.getElementById('codigoInput').value='';
  document.getElementById('resultados').style.display='none';
  document.getElementById('resultados').innerHTML='';
  document.getElementById('spinner').style.display='none';
  document.getElementById('errBox').style.display='none';
  cambiarTab('codigo');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(v){return '$'+Number(v||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});}
function stk(q){q=Number(q||0);if(q<=0)return{cls:'cero',dot:'cero',lbl:'Sin stock'};if(q<=5)return{cls:'bajo',dot:'bajo',lbl:q+' uds'};return{cls:'ok',dot:'ok',lbl:q+' uds'};}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);}
function setQ(v){document.getElementById('codigoInput').value=v;buscar();}

function cambiarTab(tab){
  modoTab=tab;
  document.getElementById('tabCodigo').className='stab'+(tab==='codigo'?' active':'');
  document.getElementById('tabDesc').className='stab'+(tab==='descripcion'?' active':'');
  var inp=document.getElementById('codigoInput');
  if(tab==='codigo'){
    inp.placeholder='Ej: 4KAR* o *456*';
    inp.setAttribute('autocapitalize','characters');
    inp.style.textTransform='uppercase';
    document.getElementById('searchChips').style.display='flex';
  } else {
    inp.placeholder='Ej: BUJIA, BOMBA DE AGUA, ALTERNADOR...';
    inp.setAttribute('autocapitalize','words');
    inp.style.textTransform='none';
    document.getElementById('searchChips').style.display='none';
  }
  inp.value='';inp.focus();
}

document.getElementById('codigoInput').addEventListener('keydown',function(e){if(e.key==='Enter')buscar();});
window.addEventListener('scroll',function(){document.getElementById('waFloat').style.display=window.scrollY>250?'flex':'none';});

async function api(url){
  var r=await fetch(SUPA_URL+url,{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
  if(!r.ok)throw new Error('API '+r.status);
  return r.json();
}

async function buscar(){
  var raw=document.getElementById('codigoInput').value.trim();
  if(!raw)return;
  var btn=document.getElementById('btnBuscar');
  btn.disabled=true;
  document.getElementById('spinner').style.display='block';
  document.getElementById('resultados').style.display='none';
  document.getElementById('errBox').style.display='none';
  try{
    if(modoTab==='descripcion'){
      var pat='%'+raw.replace(/\s+/g,'%')+'%';
      var rows=await api('/rest/v1/inventario?descripcion=ilike.'+encodeURIComponent(pat)+'&select=codigo,descripcion,precio,stock_total&order=descripcion&limit=200');
      var unicos=[],seen=new Set();
      for(var i=0;i<(rows||[]).length;i++){var c=(rows[i].codigo||'').trim();if(c&&!seen.has(c)){seen.add(c);unicos.push(rows[i]);}}
      btn.disabled=false;document.getElementById('spinner').style.display='none';
      if(!unicos.length){showErr('No se encontraron productos con "'+raw+'"');return;}
      mostrar(crearSelector(unicos));
    } else {
      var q=raw.toUpperCase();
      var esComodin=q.indexOf('*')!==-1;
      if(esComodin){
        var pat=q.replace(/\*/g,'%');
        var rows=await api('/rest/v1/inventario?codigo=ilike.'+encodeURIComponent(pat)+'&select=codigo,descripcion,precio,stock_total&order=codigo&limit=300');
        var unicos=[],seen=new Set();
        for(var i=0;i<(rows||[]).length;i++){var c=(rows[i].codigo||'').trim().toUpperCase();if(c&&!seen.has(c)){seen.add(c);unicos.push(rows[i]);}}
        btn.disabled=false;document.getElementById('spinner').style.display='none';
        if(!unicos.length){showErr('No se encontró "'+q+'"');return;}
        mostrar(crearSelector(unicos));
      } else {
        var res=await buscarFamilia(q);
        btn.disabled=false;document.getElementById('spinner').style.display='none';
        if(!res.length){showErr('No se encontró el código "'+q+'"');return;}
        var principal=null,otros=[];
        for(var i=0;i<res.length;i++){if(res[i].esPrincipal)principal=res[i];else otros.push(res[i]);}
        if(!principal)principal=res[0];
        var html='<div class="res-header"><span class="res-count">Se encontraron <strong>'+res.length+'</strong> resultado'+(res.length>1?'s':'')+'</span></div>';
        html+=crearCard(principal,false);
        if(otros.length){html+='<div class="titulo-alt">Códigos alternativos ('+otros.length+')</div>';for(var i=0;i<otros.length;i++)html+=crearCard(otros[i],true);}
        mostrar(html);
      }
    }
  }catch(e){
    btn.disabled=false;document.getElementById('spinner').style.display='none';
    showErr('Error de conexión. Inténtalo de nuevo.');
  }
}

async function buscarFamilia(codigo){
  var visitados=new Set(),cola=[codigo.toUpperCase()],res=[];
  while(cola.length){
    var actual=cola.shift();
    if(visitados.has(actual))continue;
    visitados.add(actual);
    var filas=await api('/rest/v1/inventario?codigo=ilike.'+encodeURIComponent(actual)+'&select=codigo,descripcion,precio,stock_total,codigo_alternativo&limit=20');
    if(filas&&filas.length){
      var f=filas[0];
      if(!res.some(function(r){return r.codigo.toUpperCase()===actual;}))
        res.push({codigo:f.codigo,descripcion:f.descripcion,precio:f.precio,stock_total:f.stock_total,esPrincipal:f.codigo.toUpperCase()===codigo.toUpperCase()});
      for(var j=0;j<filas.length;j++){var alt=(filas[j].codigo_alternativo||'').trim().toUpperCase();if(alt&&!visitados.has(alt))cola.push(alt);}
    }
    var rev=await api('/rest/v1/inventario?codigo_alternativo=ilike.'+encodeURIComponent(actual)+'&select=codigo,descripcion,precio,stock_total,codigo_alternativo&limit=20');
    if(rev&&rev.length){
      for(var j=0;j<rev.length;j++){
        var c=rev[j].codigo.toUpperCase();
        if(!visitados.has(c)&&!res.some(function(r){return r.codigo.toUpperCase()===c;})){
          visitados.add(c);
          res.push({codigo:rev[j].codigo,descripcion:rev[j].descripcion,precio:rev[j].precio,stock_total:rev[j].stock_total,esPrincipal:false});
          var alt2=(rev[j].codigo_alternativo||'').trim().toUpperCase();if(alt2&&!visitados.has(alt2))cola.push(alt2);
        }
      }
    }
  }
  res.sort(function(a,b){return(b.esPrincipal?1:0)-(a.esPrincipal?1:0);});
  return res;
}

function getCant(cod){for(var i=0;i<carrito.length;i++){if(carrito[i].codigo===cod)return carrito[i].cantidad;}return 0;}

function crearSelector(rows){
  var h='<div class="sel-panel"><div class="sel-head"><h3>Selecciona un producto</h3><span class="sel-count">'+rows.length+'</span></div><div class="sel-list">';
  for(var i=0;i<rows.length;i++){
    var r=rows[i],s=stk(r.stock_total),cant=getCant(r.codigo);
    h+='<div class="sel-row" data-cod="'+esc(r.codigo)+'" data-desc="'+esc(r.descripcion)+'" data-precio="'+(r.precio||0)+'" data-action="abrir">';
    h+='<span class="sel-cod">'+esc(r.codigo)+'</span>';
    h+='<span class="sel-desc">'+esc(r.descripcion||'')+'</span>';
    h+='<span class="sel-right">';
    h+='<span class="sel-precio">'+fmt(r.precio)+'</span>';
    h+='<span class="sel-stock '+s.cls+'"><span class="dot '+s.dot+'"></span>'+s.lbl+'</span>';
    h+='<span class="sel-qty" data-action="qty"><button class="sel-qty-btn" data-action="minus">−</button><span class="sel-qty-num '+(cant>0?'activo':'cero')+'">'+cant+'</span><button class="sel-qty-btn" data-action="plus">+</button></span>';
    h+='</span></div>';
  }
  h+='</div></div>';
  return h;
}

function crearCard(item,esAlt){
  var s=stk(item.stock_total),cant=getCant(item.codigo);
  var badge=item.esPrincipal?'<span class="badge badge-p">Seleccionado</span>':'<span class="badge badge-a">Alternativo</span>';
  var cls=item.esPrincipal?'card principal':'card alt-click';
  var hint=esAlt?'<span class="click-hint"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"/></svg> Ver sus alternativos</span>':'';
  var h='<div class="'+cls+'" data-cod="'+esc(item.codigo)+'" data-desc="'+esc(item.descripcion)+'" data-precio="'+(item.precio||0)+'" '+(esAlt?'data-action="abrir"':'')+'>'+hint;
  h+='<div class="card-cod">'+esc(item.codigo)+' '+badge+'</div>';
  h+='<div class="card-desc">'+esc(item.descripcion||'')+'</div>';
  h+='<div class="card-datos"><div class="dato"><span class="dato-lbl">Precio</span><span class="dato-val precio">'+fmt(item.precio)+'</span></div><div class="dato"><span class="dato-lbl">Stock</span><span class="dato-val '+s.cls+'"><span class="dot '+s.dot+'"></span>'+s.lbl+'</span></div></div>';
  h+='<div class="card-add-row"><div class="card-qty" data-action="qty"><button class="card-qty-btn minus" data-action="minus">−</button><span class="card-qty-num '+(cant>0?'activo':'cero')+'">'+cant+'</span><button class="card-qty-btn" data-action="plus">+</button></div><span class="add-label '+(cant>0?'activo':'')+'">'+(cant>0?'En pedido':'Agregar al pedido')+'</span></div>';
  h+='</div>';
  return h;
}

document.getElementById('mainContainer').addEventListener('click',function(e){
  var actionEl=e.target.closest('[data-action]');
  if(!actionEl)return;
  var action=actionEl.getAttribute('data-action');
  if(action==='plus'||action==='minus'){
    e.preventDefault();e.stopPropagation();
    var row=actionEl.closest('[data-cod]');
    if(!row)return;
    cambiarCantidadItem(row.getAttribute('data-cod'),row.getAttribute('data-desc'),parseFloat(row.getAttribute('data-precio'))||0,action==='plus'?1:-1);
    return;
  }
  if(action==='abrir'){
    e.preventDefault();
    var row=actionEl.closest('[data-cod]');
    if(!row)return;
    var cod=row.getAttribute('data-cod');
    document.getElementById('codigoInput').value=cod;
    modoTab='codigo';
    document.getElementById('tabCodigo').className='stab active';
    document.getElementById('tabDesc').className='stab';
    document.getElementById('codigoInput').style.textTransform='uppercase';
    document.getElementById('searchChips').style.display='flex';
    buscar();
  }
});

function cambiarCantidadItem(cod,desc,precio,delta){
  var idx=-1;for(var i=0;i<carrito.length;i++){if(carrito[i].codigo===cod){idx=i;break;}}
  if(idx>=0){carrito[idx].cantidad+=delta;if(carrito[idx].cantidad<=0)carrito.splice(idx,1);}
  else if(delta>0){carrito.push({codigo:cod,descripcion:desc,precio:precio,cantidad:1});toast(cod+' — agregado');}
  actualizarContadores();
  actualizarUI();
}

function actualizarContadores(){
  var todos=document.querySelectorAll('[data-cod]');
  for(var i=0;i<todos.length;i++){
    var el=todos[i],cod=el.getAttribute('data-cod'),cant=getCant(cod);
    var sn=el.querySelector('.sel-qty-num');
    if(sn){sn.textContent=cant;sn.className='sel-qty-num '+(cant>0?'activo':'cero');}
    var cn=el.querySelector('.card-qty-num');
    if(cn){cn.textContent=cant;cn.className='card-qty-num '+(cant>0?'activo':'cero');}
    var lbl=el.querySelector('.add-label');
    if(lbl){lbl.className='add-label '+(cant>0?'activo':'');lbl.textContent=cant>0?'En pedido':'Agregar al pedido';}
  }
}

function mostrar(html){var c=document.getElementById('resultados');c.innerHTML=html;c.style.display='block';c.scrollIntoView({behavior:'smooth',block:'start'});}
function showErr(m){document.getElementById('errTxt').textContent=m;document.getElementById('errBox').style.display='block';}

function actualizarUI(){
  var n=0,total=0;
  for(var i=0;i<carrito.length;i++){n+=carrito[i].cantidad;total+=carrito[i].precio*carrito[i].cantidad;}
  var fab=document.getElementById('cartFab'),bn=document.getElementById('cartN');
  fab.style.display=n>0?'flex':'none';bn.style.display=n>0?'flex':'none';bn.textContent=n;
  var banner=document.getElementById('waBanner');
  if(n>0){
    banner.removeAttribute('href');banner.onclick=function(e){e.preventDefault();abrirModal();};
    document.getElementById('waBannerTitle').textContent='Pedido ('+n+' artículo'+(n>1?'s':'')+')';
    document.getElementById('waBannerSub').textContent='Total: '+fmt(total)+' — Toca para enviar';
  } else {
    banner.onclick=null;banner.href='https://wa.me/528123986039?text=Hola%2C%20necesito%20pasar%20un%20pedido';
    document.getElementById('waBannerTitle').textContent='¿Necesitas pasar pedido?';
    document.getElementById('waBannerSub').textContent='Escríbenos por WhatsApp y lo preparamos';
  }
  renderCarrito();
}

function renderCarrito(){
  var body=document.getElementById('cartBody'),ftr=document.getElementById('cartFtr');
  var total=0;for(var i=0;i<carrito.length;i++)total+=carrito[i].precio*carrito[i].cantidad;
  if(!carrito.length){body.innerHTML='<div class="cart-empty">Tu pedido está vacío</div>';ftr.style.display='none';return;}
  ftr.style.display='block';
  document.getElementById('cartTotalVal').textContent=fmt(total);
  var h='';
  for(var i=0;i<carrito.length;i++){
    var c=carrito[i];
    h+='<div class="cart-item"><div class="ci-info"><div class="ci-cod">'+esc(c.codigo)+'</div><div class="ci-desc">'+esc(c.descripcion||'')+'</div><div class="ci-precio">'+fmt(c.precio*c.cantidad)+'</div></div>';
    h+='<div class="ci-qty"><button class="qbtn" data-idx="'+i+'" data-d="-1">−</button><span class="qnum">'+c.cantidad+'</span><button class="qbtn" data-idx="'+i+'" data-d="1">+</button></div></div>';
  }
  body.innerHTML=h;
}

document.getElementById('cartBody').addEventListener('click',function(e){
  var btn=e.target.closest('[data-idx]');
  if(btn){
    var idx=parseInt(btn.getAttribute('data-idx')),d=parseInt(btn.getAttribute('data-d'));
    carrito[idx].cantidad+=d;
    if(carrito[idx].cantidad<=0)carrito.splice(idx,1);
    actualizarContadores();actualizarUI();
  }
});

function abrirCarrito(){renderCarrito();document.getElementById('overlay').classList.add('open');document.getElementById('cartPanel').classList.add('open');}
function cerrarCarrito(){document.getElementById('overlay').classList.remove('open');document.getElementById('cartPanel').classList.remove('open');}
function abrirModal(){cerrarCarrito();document.getElementById('modalBg').classList.add('open');}
function cerrarModal(){document.getElementById('modalBg').classList.remove('open');}

function enviarWA(){
  var nombre=document.getElementById('clienteNombre').value.trim();
  var tel=document.getElementById('clienteTel').value.trim();
  if(!nombre){document.getElementById('clienteNombre').focus();document.getElementById('clienteNombre').style.borderColor='var(--rojo)';return;}
  var total=0;for(var i=0;i<carrito.length;i++)total+=carrito[i].precio*carrito[i].cantidad;
  var msg='*Pedido MOSAR Refaccionarias*\n\n*Cliente:* '+nombre+'\n';
  if(tel)msg+='*No. de cliente:* '+tel+'\n';
  msg+='\n*Artículos:*\n';
  for(var i=0;i<carrito.length;i++){var c=carrito[i];msg+='• '+c.codigo+' — '+c.descripcion+'\n  '+fmt(c.precio)+' x'+c.cantidad+' = '+fmt(c.precio*c.cantidad)+'\n';}
  msg+='\n*Total estimado: '+fmt(total)+'*\n\nGracias.';
  window.open('https://wa.me/528123986039?text='+encodeURIComponent(msg),'_blank');
  cerrarModal();
}
</script>
</body>
</html>
